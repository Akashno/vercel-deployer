name: Automated Semantic Release

on:
  push:
    branches:
      - master # Triggers the workflow only when code merges to main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Double-enforces write permissions for Git tags

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: Fetches all git history and tags to accurately compute version

      - name: Calculate and Create Semantic Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
